# Hosted VicSee MCP connector — Cloudflare Worker (#231 Phase 2: OAuth).
# Deploy (Part C): 1) wrangler kv namespace create OAUTH_KV  → paste id below
#                  2) wrangler secret put MCP_CONNECT_SIGNING_SECRET  (match vicsee-v2)
#                  3) npm run deploy
# Custom domain mcp.vicsee.com is provisioned by wrangler. The stdio npm package
# (src/index.ts) is unaffected. Replaces the v1 secret-URL transport (#231 P5).

name = "vicsee-mcp-connector"
main = "src/worker.ts"
account_id = "4d55e28ca06946c51ed53df2950ed73b"
compatibility_date = "2026-06-01"
compatibility_flags = ["nodejs_compat"]

# Custom domain — wrangler provisions DNS + cert (vicsee.com zone is on this account).
routes = [{ pattern = "mcp.vicsee.com", custom_domain = true }]

# Required by @cloudflare/workers-oauth-provider — stores access/refresh tokens,
# grants, and dynamically-registered (DCR) clients. Create at Part C:
#   wrangler kv namespace create OAUTH_KV   (then paste the id here)
kv_namespaces = [
  { binding = "OAUTH_KV", id = "REPLACE_WITH_OAUTH_KV_ID" }
]

[vars]
# Where /authorize delegates login (Better Auth session + consent).
VICSEE_CONSENT_URL = "https://vicsee.com/connect/authorize"
# MCP_CONNECT_SIGNING_SECRET is a SECRET — set via:
#   wrangler secret put MCP_CONNECT_SIGNING_SECRET
# (do not put it here). Must match vicsee-v2's MCP_CONNECT_SIGNING_SECRET.
