# Hosted VicSee MCP connector — Cloudflare Worker (#231)
# Deploy: npm run deploy  (after `wrangler kv namespace create TOKEN_CACHE`
# and `wrangler secret put MCP_RESOLVE_SECRET`). Custom domain mcp.vicsee.com
# is added in Part C. The stdio npm package (src/index.ts) is unaffected.

name = "vicsee-mcp-connector"
main = "src/worker.ts"
compatibility_date = "2026-06-01"
compatibility_flags = ["nodejs_compat"]

# Token → api_key cache (system of record is vicsee.connector_token in Postgres).
# Replace id after: wrangler kv namespace create TOKEN_CACHE
kv_namespaces = [
  { binding = "TOKEN_CACHE", id = "REPLACE_IN_PART_C" }
]

[vars]
VICSEE_RESOLVE_URL = "https://vicsee.com/api/v1/internal/mcp/resolve-token"
# MCP_RESOLVE_SECRET is a SECRET — set via: wrangler secret put MCP_RESOLVE_SECRET
# (do not put it here). Must match vicsee-v2's MCP_RESOLVE_SECRET.

# Custom domain (Part C): route mcp.vicsee.com to this Worker via the Cloudflare
# dashboard (Workers → Custom Domains) or a [[routes]] block once DNS is ready.
